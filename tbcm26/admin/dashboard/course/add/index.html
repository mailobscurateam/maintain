<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Manager | EduManager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <!-- Auth Guard Overlay -->
    <div id="authGuard" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <i class="fas fa-circle-notch fa-spin text-4xl text-indigo-600 mb-4"></i>
            <p class="text-slate-600 font-medium">Verifying Credentials...</p>
        </div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">EduManager</span>
            </div>
            <button id="logoutBtn" class="px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-red-100 flex items-center">
                <i class="fas fa-sign-out-alt mr-2"></i> Sign Out
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-4 sm:px-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Course Catalog</h1>
                <p class="text-slate-500 mt-1">Manage all your academic courses and enrollment links.</p>
            </div>
            <button onclick="toggleModal(true)" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-all flex items-center">
                <i class="fas fa-plus mr-2"></i> Add New Course
            </button>
        </div>

        <!-- Course List Table -->
        <div class="glass rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Course Name</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Instructor</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Created At</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="courseTableBody" class="divide-y divide-slate-100">
                        <!-- Courses populated by JS -->
                        <tr>
                            <td colspan="4" class="px-6 py-12 text-center text-slate-400">
                                <i class="fas fa-circle-notch fa-spin mr-2"></i> Loading courses...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Create Course Modal -->
    <div id="courseModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-xl rounded-3xl shadow-2xl modal-enter overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-white/50">
                <h2 class="text-xl font-bold text-slate-900">New Course Setup</h2>
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="courseForm" class="p-8 space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Course Name</label>
                    <input type="text" name="name" required
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
                        placeholder="e.g. Full Stack Web Development">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Instructor Name</label>
                    <input type="text" name="instructor" required
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
                        placeholder="e.g. Dr. Jane Smith">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Course Image URL</label>
                    <input type="url" name="image_url"
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
                        placeholder="https://images.unsplash.com/...">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Enrollment Link (Optional)</label>
                    <input type="url" name="enroll_link"
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
                        placeholder="https://enroll.link">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Description</label>
                    <textarea name="description" rows="3"
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
                        placeholder="What is this course about?"></textarea>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="toggleModal(false)" 
                        class="flex-1 px-6 py-3 border border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-all">
                        Cancel
                    </button>
                    <button type="submit" id="saveBtn"
                        class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all">
                        Save Course
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://tsaoxjzvhxiggntibpui.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYW94anp2aHhpZ2dudGlicHVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDQ2OTAsImV4cCI6MjA5MTQyMDY5MH0.Q5Iu51O3NK4k2kcc_GoegnyAYIFIs2SUkQOV10qp2jI';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const courseTableBody = document.getElementById('courseTableBody');
        const courseForm = document.getElementById('courseForm');
        const authGuard = document.getElementById('authGuard');
        const logoutBtn = document.getElementById('logoutBtn');
        const saveBtn = document.getElementById('saveBtn');

        // Modal Control
        window.toggleModal = (show) => {
            const modal = document.getElementById('courseModal');
            if(show) modal.classList.remove('hidden');
            else modal.classList.add('hidden');
        };

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = '/login';
                return null;
            }
            authGuard.classList.add('hidden');
            return session.user;
        }

        async function loadCourses() {
            try {
                const { data, error } = await supabase
                    .from('courses')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data.length === 0) {
                    courseTableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-slate-400 font-medium">No courses added yet.</td></tr>';
                    return;
                }

                courseTableBody.innerHTML = data.map(course => `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center mr-3 overflow-hidden border border-slate-100">
                                    ${course.image_url ? `<img src="${course.image_url}" class="w-full h-full object-cover">` : '<i class="fas fa-book text-indigo-400"></i>'}
                                </div>
                                <span class="font-semibold text-slate-900">${course.name}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-slate-600">${course.instructor || 'N/A'}</td>
                        <td class="px-6 py-4 text-slate-500 text-sm">
                            ${new Date(course.created_at).toLocaleDateString()}
                        </td>
                        <td class="px-6 py-4">
                            <button class="text-slate-400 hover:text-red-600 transition-colors p-2" onclick="deleteCourse('${course.id}')">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error(err);
                courseTableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-red-500">Error loading data.</td></tr>';
            }
        }

        window.deleteCourse = async (id) => {
            if (!confirm('Are you sure? This will not delete the linked lessons but the course entry will be gone.')) return;
            
            const { error } = await supabase.from('courses').delete().eq('id', id);
            if (error) alert('Error: ' + error.message);
            else loadCourses();
        };

        courseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Saving...';

            const formData = new FormData(courseForm);
            const payload = {
                name: formData.get('name'),
                instructor: formData.get('instructor'),
                image_url: formData.get('image_url'),
                enroll_link: formData.get('enroll_link'),
                description: formData.get('description')
            };

            try {
                const { error } = await supabase.from('courses').insert([payload]);
                if (error) throw error;
                
                courseForm.reset();
                toggleModal(false);
                loadCourses();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'Save Course';
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login';
        });

        window.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (user) loadCourses();
        });
    </script>
</body>
</html>
