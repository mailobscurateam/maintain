<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Manager | EduManager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* Custom scrollbar for better UX */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <!-- Auth Guard Overlay -->
    <div id="authGuard" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <i class="fas fa-circle-notch fa-spin text-4xl text-indigo-600 mb-4"></i>
            <p class="text-slate-600 font-medium">Verifying Credentials...</p>
        </div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <!-- Logo Section -->
            <div class="flex items-center space-x-2 cursor-pointer group" onclick="window.location.href='/tbcm26/admin/dashboard/'">
                <div class="bg-indigo-600 p-2 rounded-lg text-white group-hover:bg-indigo-700 transition-colors">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">EduManager</span>
            </div>

            <!-- Navigation Actions -->
            <div class="flex items-center space-x-3">
                <button onclick="window.location.href='/tbcm26/admin/dashboard/'" class="hidden sm:flex items-center px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                    <i class="fas fa-th-large mr-2"></i> Dashboard
                </button>
                
                <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>

                <button id="logoutBtn" class="px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-red-100 flex items-center">
                    <i class="fas fa-sign-out-alt mr-2"></i> <span class="hidden xs:inline">Sign Out</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-4 sm:px-6">
        <!-- Breadcrumbs for better context -->
        <nav class="flex mb-4 text-sm text-slate-500" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3">
                <li class="inline-flex items-center">
                    <a href="/tbcm26/admin/dashboard/" class="hover:text-indigo-600">Dashboard</a>
                </li>
                <li>
                    <div class="flex items-center">
                        <i class="fas fa-chevron-right text-[10px] mx-2"></i>
                        <span class="font-medium text-slate-800">Course Manager</span>
                    </div>
                </li>
            </ol>
        </nav>

        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Course Catalog</h1>
                <p class="text-slate-500 mt-1">Manage all your academic courses and enrollment links.</p>
            </div>
            <div class="flex items-center gap-3">
                <!-- Mobile Only Dashboard Link -->
                <button onclick="window.location.href='/tbcm26/admin/dashboard/'" class="sm:hidden p-3 text-slate-600 border border-slate-200 rounded-xl bg-white hover:bg-slate-50 transition-all">
                    <i class="fas fa-th-large"></i>
                </button>
                <button onclick="toggleModal(true)" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-all flex-1 md:flex-none flex items-center justify-center">
                    <i class="fas fa-plus mr-2"></i> Add New Course
                </button>
            </div>
        </div>

        <!-- Course List Table -->
        <div class="glass rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Course Name</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Instructor</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Created At</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="courseTableBody" class="divide-y divide-slate-100 bg-white/50">
                        <!-- Courses populated by JS -->
                        <tr>
                            <td colspan="4" class="px-6 py-12 text-center text-slate-400">
                                <i class="fas fa-circle-notch fa-spin mr-2"></i> Loading courses...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Create Course Modal -->
    <div id="courseModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-xl rounded-3xl shadow-2xl modal-enter overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-white">
                <div>
                    <h2 class="text-xl font-bold text-slate-900">New Course Setup</h2>
                    <p class="text-sm text-slate-500">Enter the details for the new academic offering.</p>
                </div>
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-600 transition-colors p-2 hover:bg-slate-50 rounded-full">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="courseForm" class="p-8 space-y-5 bg-white/30">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Course Name</label>
                        <input type="text" name="name" required
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="e.g. Full Stack Web Development">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Instructor Name</label>
                        <input type="text" name="instructor" required
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="e.g. Dr. Jane Smith">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Enrollment Link</label>
                        <input type="url" name="enroll_link"
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="https://enroll.link">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Course Image URL</label>
                    <input type="url" name="image_url"
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                        placeholder="https://images.unsplash.com/...">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Description</label>
                    <textarea name="description" rows="3"
                        class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all resize-none"
                        placeholder="What is this course about?"></textarea>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="toggleModal(false)" 
                        class="flex-1 px-6 py-3 border border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-all">
                        Cancel
                    </button>
                    <button type="submit" id="saveBtn"
                        class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all">
                        Save Course
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://tsaoxjzvhxiggntibpui.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYW94anp2aHhpZ2dudGlicHVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDQ2OTAsImV4cCI6MjA5MTQyMDY5MH0.Q5Iu51O3NK4k2kcc_GoegnyAYIFIs2SUkQOV10qp2jI';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const courseTableBody = document.getElementById('courseTableBody');
        const courseForm = document.getElementById('courseForm');
        const authGuard = document.getElementById('authGuard');
        const logoutBtn = document.getElementById('logoutBtn');
        const saveBtn = document.getElementById('saveBtn');

        // Modal Control
        window.toggleModal = (show) => {
            const modal = document.getElementById('courseModal');
            if(show) {
                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto';
                courseForm.reset();
            }
        };

        async function checkAuth() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.href = 'login.html';
                    return null;
                }
                authGuard.classList.add('hidden');
                return session.user;
            } catch (e) {
                console.error("Auth check failed", e);
                window.location.href = 'login.html';
            }
        }

        async function loadCourses() {
            try {
                const { data, error } = await supabase
                    .from('courses')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!data || data.length === 0) {
                    courseTableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-12 text-center text-slate-400 font-medium">No courses added yet. Start by creating your first one!</td></tr>';
                    return;
                }

                courseTableBody.innerHTML = data.map(course => `
                    <tr class="hover:bg-indigo-50/30 transition-colors group">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-lg bg-indigo-50 flex items-center justify-center mr-3 overflow-hidden border border-slate-100 flex-shrink-0">
                                    ${course.image_url ? 
                                        `<img src="${course.image_url}" class="w-full h-full object-cover" onerror="this.innerHTML='<i class=\'fas fa-book text-indigo-400\'></i>'; this.src='';">` : 
                                        '<i class="fas fa-book text-indigo-400"></i>'}
                                </div>
                                <div>
                                    <div class="font-semibold text-slate-900">${course.name}</div>
                                    <div class="text-xs text-slate-400 md:hidden">${course.instructor || 'Staff'}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-slate-600 hidden md:table-cell">${course.instructor || 'N/A'}</td>
                        <td class="px-6 py-4 text-slate-500 text-sm hidden sm:table-cell">
                            ${new Date(course.created_at).toLocaleDateString()}
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex items-center justify-end space-x-2">
                                ${course.enroll_link ? `
                                    <a href="${course.enroll_link}" target="_blank" class="p-2 text-indigo-500 hover:bg-indigo-50 rounded-lg transition-colors" title="View Enrollment">
                                        <i class="fas fa-external-link-alt"></i>
                                    </a>
                                ` : ''}
                                <button class="text-slate-400 hover:text-red-600 transition-colors p-2 hover:bg-red-50 rounded-lg" onclick="deleteCourse('${course.id}')" title="Delete Course">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error(err);
                courseTableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-red-500 font-medium"><i class="fas fa-exclamation-circle mr-2"></i> Error loading data. Please try again.</td></tr>';
            }
        }

        window.deleteCourse = async (id) => {
            if (!confirm('Are you sure? This will remove the course entry from the catalog.')) return;
            
            try {
                const { error } = await supabase.from('courses').delete().eq('id', id);
                if (error) throw error;
                loadCourses();
            } catch (err) {
                alert('Error deleting course: ' + err.message);
            }
        };

        courseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            saveBtn.disabled = true;
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Saving...';

            const formData = new FormData(courseForm);
            const payload = {
                name: formData.get('name'),
                instructor: formData.get('instructor'),
                image_url: formData.get('image_url'),
                enroll_link: formData.get('enroll_link'),
                description: formData.get('description')
            };

            try {
                const { error } = await supabase.from('courses').insert([payload]);
                if (error) throw error;
                
                toggleModal(false);
                loadCourses();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            }
        });

        logoutBtn.addEventListener('click', async () => {
            const { error } = await supabase.auth.signOut();
            if (error) {
                console.error("Logout error", error);
            }
            window.location.href = 'login.html';
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (user) loadCourses();
        });
    </script>
</body>
</html>
