<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Task Admin - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; opacity: 0; transition: opacity 0.3s ease; }
        body.auth-checked { opacity: 1; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .task-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .task-card:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        
        .subtask-item { transition: background 0.2s ease; }
        .subtask-item:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <div id="app-container" class="max-w-7xl mx-auto px-4 py-8 md:px-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <div class="bg-indigo-600 p-2.5 rounded-xl text-white shadow-lg shadow-indigo-200">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.3" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Speed Task <span class="text-indigo-600">Admin</span></h1>
                </div>
                <p class="text-slate-500 font-medium ml-1">Centralized high-volume resource management</p>
            </div>
            
            <div class="flex items-center gap-3">
                <div id="user-info" class="hidden md:flex items-center bg-white px-4 py-2.5 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full mr-3 animate-pulse"></div>
                    <span id="user-display" class="text-xs font-bold text-slate-600">Checking...</span>
                </div>
                <button onclick="openTaskModal()" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold shadow-xl hover:bg-indigo-600 transition-all flex items-center gap-2 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                    Create Master
                </button>
                <button onclick="handleLogout()" class="p-3 text-slate-400 hover:text-red-500 transition-colors" title="Logout">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                </button>
            </div>
        </header>

        <!-- Stats Overview -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Tasks</p>
                <h2 id="stat-total" class="text-3xl font-black text-indigo-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Units</p>
                <div class="flex items-baseline gap-2">
                    <h2 id="stat-units" class="text-3xl font-black text-slate-800">0</h2>
                    <span class="text-xs font-bold text-slate-400">active</span>
                </div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Avg Units/Task</p>
                <h2 id="stat-avg" class="text-3xl font-black text-emerald-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">System Health</p>
                <h2 class="text-xl font-black text-orange-500">Optimized</h2>
            </div>
        </div>

        <!-- Task Grid -->
        <div id="tasks-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="col-span-full flex flex-col items-center py-32 text-slate-400">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-500 border-t-transparent mb-4"></div>
                <p class="font-bold tracking-tight">Syncing Large Dataset...</p>
            </div>
        </div>
    </div>

    <!-- Master Task Modal -->
    <div id="task-modal" class="fixed inset-0 z-40 hidden flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-2xl overflow-hidden animate-fade-in">
            <div class="p-8 border-b flex justify-between items-center bg-slate-50/80">
                <div>
                    <h3 id="modal-title" class="text-2xl font-black text-slate-800 tracking-tight">Create Speed Task</h3>
                    <p class="text-sm text-slate-500 font-medium">Define master curriculum goals</p>
                </div>
                <button onclick="closeTaskModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white border border-slate-200 text-slate-400 hover:text-slate-600 transition-all shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <form id="task-form" class="p-8 space-y-6 max-h-[75vh] overflow-y-auto custom-scrollbar">
                <input type="hidden" id="edit-task-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Category</label>
                        <select id="task-subject" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-bold" required>
                            <option value="Physics">Physics</option>
                            <option value="Chemistry">Chemistry</option>
                            <option value="Mathematics">Combined Maths</option>
                            <option value="Biology">Biology</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Task Title</label>
                        <input type="text" id="task-title" placeholder="e.g. Mechanics 2024" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-bold" required>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Global Description</label>
                    <textarea id="task-desc" rows="2" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all" placeholder="High-level objectives..."></textarea>
                </div>
                <!-- Updated: Added External Resource Field to Master Task -->
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Global External Resource (URL)</label>
                    <input type="url" id="task-url-master" placeholder="https://main-resource-link.com" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-bold">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-indigo-50 rounded-[2rem]">
                    <div>
                        <label class="block text-[10px] font-black text-indigo-400 uppercase mb-2 ml-1">Start Window</label>
                        <input type="datetime-local" id="task-start" class="w-full px-4 py-3 bg-white border border-indigo-100 rounded-xl outline-none font-bold text-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-indigo-400 uppercase mb-2 ml-1">End Window</label>
                        <input type="datetime-local" id="task-end" class="w-full px-4 py-3 bg-white border border-indigo-100 rounded-xl outline-none font-bold text-slate-700">
                    </div>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t">
                    <button type="button" onclick="closeTaskModal()" class="px-6 py-3 text-slate-500 font-bold hover:bg-slate-100 rounded-xl transition">Discard</button>
                    <button type="submit" class="px-10 py-3.5 bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition active:scale-95">Save Master Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Sub-Task Modal -->
    <div id="subtask-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden animate-fade-in">
            <div class="p-8 border-b bg-slate-50/80">
                <h3 class="text-xl font-black text-slate-800">New Individual Unit</h3>
                <p class="text-sm text-slate-500 font-medium">Add a step to the massive sequence</p>
            </div>
            <form id="subtask-form" class="p-8 space-y-5">
                <input type="hidden" id="parent-task-id">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Unit Name / ID</label>
                    <input type="text" id="subtask-title" placeholder="e.g. Part 01: Vector Intro" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Expected Start</label>
                        <input type="datetime-local" id="subtask-start" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Expected End</label>
                        <input type="datetime-local" id="subtask-end" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs font-bold">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Resource URL</label>
                    <input type="url" id="subtask-url" placeholder="https://..." class="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="closeSubTaskModal()" class="px-6 py-3 text-slate-500 font-bold hover:bg-slate-100 rounded-xl transition">Cancel</button>
                    <button type="submit" class="px-8 py-3.5 bg-slate-900 text-white font-black rounded-2xl shadow-xl hover:bg-indigo-600 transition active:scale-95">Add Unit</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://tsaoxjzvhxiggntibpui.supabase.co'; 
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYW94anp2aHhpZ2dudGlicHVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDQ2OTAsImV4cCI6MjA5MTQyMDY5MH0.Q5Iu51O3NK4k2kcc_GoegnyAYIFIs2SUkQOV10qp2jI';
            
            const client = window.supabaseClient || window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            window.supabaseClient = client;

            let currentUser = null;
            let tasks = [];

            async function checkAuth() {
                const { data: { session } } = await client.auth.getSession();
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                currentUser = session.user;
                document.getElementById('user-display').textContent = currentUser.email;
                document.body.classList.add('auth-checked');
                fetchData();
            }

            window.handleLogout = async function() {
                await client.auth.signOut();
                window.location.href = 'login.html';
            };

            async function fetchData() {
                try {
                    const { data, error } = await client
                        .from('speed_tasks')
                        .select('*, speed_subtasks (*)')
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    tasks = data || [];
                    
                    updateStats();
                    renderTasks();
                } catch (err) {
                    console.error("Link Failure:", err.message);
                    document.getElementById('tasks-container').innerHTML = `
                        <div class="col-span-full p-8 bg-red-50 text-red-600 rounded-[2rem] border border-red-100">
                            <strong class="block mb-1">Database Error</strong>
                            <p class="text-sm opacity-80">${err.message}</p>
                        </div>`;
                }
            }

            function updateStats() {
                const total = tasks.length;
                const units = tasks.reduce((acc, t) => acc + (t.speed_subtasks?.length || 0), 0);
                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-units').textContent = units;
                document.getElementById('stat-avg').textContent = total > 0 ? (units / total).toFixed(1) : 0;
            }

            window.filterSubtasks = function(taskId, query) {
                const container = document.getElementById(`subtask-list-${taskId}`);
                const items = container.querySelectorAll('.subtask-item');
                let found = 0;
                items.forEach(item => {
                    const text = item.getAttribute('data-title').toLowerCase();
                    if (text.includes(query.toLowerCase())) {
                        item.classList.remove('hidden');
                        found++;
                    } else {
                        item.classList.add('hidden');
                    }
                });
                document.getElementById(`count-label-${taskId}`).textContent = query ? `${found} matches` : `${items.length} units total`;
            };

            function renderTasks() {
                const container = document.getElementById('tasks-container');
                container.innerHTML = '';

                if (tasks.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full bg-white rounded-[3rem] py-32 text-center border-2 border-dashed border-slate-200">
                            <h3 class="text-2xl font-black text-slate-800 mb-2 tracking-tight">Empty Workspace</h3>
                            <p class="text-slate-400 font-medium mb-10 max-w-sm mx-auto">Start creating master tasks to populate your dashboard with educational units.</p>
                            <button onclick="openTaskModal()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black shadow-2xl shadow-indigo-200">Get Started</button>
                        </div>
                    `;
                    return;
                }

                tasks.forEach(task => {
                    const subtasks = task.speed_subtasks || [];
                    const isOverloaded = subtasks.length > 30;
                    
                    const card = document.createElement('div');
                    card.className = 'task-card bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200 flex flex-col gap-6 animate-fade-in relative overflow-hidden';
                    card.innerHTML = `
                        ${isOverloaded ? '<div class="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>' : ''}
                        
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="flex items-center gap-2 mb-3">
                                    <span class="inline-flex items-center px-3 py-1 bg-indigo-50 text-indigo-700 text-[10px] font-black uppercase tracking-widest rounded-full">
                                        ${task.subject}
                                    </span>
                                    ${task.external_resource ? `
                                        <a href="${task.external_resource}" target="_blank" class="p-1 text-slate-400 hover:text-indigo-600 transition-colors" title="Global Resource">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>
                                        </a>
                                    ` : ''}
                                </div>
                                <h3 class="text-2xl font-black text-slate-800 leading-tight pr-10">${task.title}</h3>
                                ${task.description ? `<p class="text-xs text-slate-400 mt-2 font-medium line-clamp-2">${task.description}</p>` : ''}
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editTask('${task.id}')" class="p-2.5 bg-slate-50 rounded-xl text-slate-400 hover:text-indigo-600 border border-slate-100 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                                </button>
                                <button onclick="deleteTask('${task.id}')" class="p-2.5 bg-slate-50 rounded-xl text-slate-400 hover:text-red-500 border border-slate-100 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                                </button>
                            </div>
                        </div>

                        <div class="pt-6 border-t border-slate-100 flex flex-col flex-1">
                            <div class="flex items-center justify-between mb-4">
                                <div>
                                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Master Units</h4>
                                    <p id="count-label-${task.id}" class="text-[10px] font-bold text-slate-400">${subtasks.length} total</p>
                                </div>
                                <button onclick="openSubTaskModal('${task.id}')" class="px-4 py-2 bg-indigo-600 text-white text-[11px] font-black rounded-xl hover:bg-slate-900 transition-all shadow-md">
                                    + ADD NEW
                                </button>
                            </div>

                            ${subtasks.length > 5 ? `
                            <div class="relative mb-3">
                                <input type="text" 
                                    oninput="filterSubtasks('${task.id}', this.value)" 
                                    placeholder="Search ${subtasks.length} units..." 
                                    class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-100 rounded-xl text-xs outline-none focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-200 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                            </div>
                            ` : ''}

                            <div id="subtask-list-${task.id}" class="space-y-1 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
                                ${subtasks.length > 0 ? subtasks.map(sub => `
                                    <div class="subtask-item group flex items-center justify-between p-3 rounded-xl border border-transparent hover:border-slate-100 hover:shadow-sm" data-title="${sub.title}">
                                        <div class="flex items-center gap-3 overflow-hidden">
                                            <div class="w-1.5 h-1.5 rounded-full bg-slate-200 group-hover:bg-indigo-400 transition-colors"></div>
                                            <span class="text-xs font-bold text-slate-600 truncate">${sub.title}</span>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            ${sub.external_resource ? `<a href="${sub.external_resource}" target="_blank" class="p-1.5 text-slate-300 hover:text-indigo-500"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg></a>` : ''}
                                            <button onclick="deleteSubTask('${sub.id}')" class="p-1.5 text-slate-200 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                            </button>
                                        </div>
                                    </div>
                                `).join('') : `
                                    <div class="flex flex-col items-center justify-center py-10 text-slate-300 border-2 border-dashed border-slate-50 rounded-2xl">
                                        <p class="text-[10px] font-black uppercase">No Units Assigned</p>
                                    </div>
                                `}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            window.openTaskModal = function() { 
                document.getElementById('task-form').reset(); 
                document.getElementById('edit-task-id').value = ''; 
                document.getElementById('modal-title').textContent = 'Create Master Task'; 
                document.getElementById('task-modal').classList.remove('hidden'); 
            };
            
            window.closeTaskModal = function() { 
                document.getElementById('task-modal').classList.add('hidden'); 
            };

            window.openSubTaskModal = function(taskId) { 
                document.getElementById('subtask-form').reset(); 
                document.getElementById('parent-task-id').value = taskId; 
                document.getElementById('subtask-modal').classList.remove('hidden'); 
            };

            window.closeSubTaskModal = function() { 
                document.getElementById('subtask-modal').classList.add('hidden'); 
            };

            document.getElementById('task-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('edit-task-id').value;
                const payload = {
                    title: document.getElementById('task-title').value,
                    subject: document.getElementById('task-subject').value,
                    description: document.getElementById('task-desc').value,
                    external_resource: document.getElementById('task-url-master').value, // Correctly mapped to column
                    start_time: document.getElementById('task-start').value || null,
                    end_time: document.getElementById('task-end').value || null,
                    admin_id: currentUser.id
                };
                
                try {
                    if (id) await client.from('speed_tasks').update(payload).eq('id', id);
                    else await client.from('speed_tasks').insert([payload]);
                    closeTaskModal(); fetchData();
                } catch(err) { console.error(err); }
            });

            document.getElementById('subtask-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const payload = {
                    task_id: document.getElementById('parent-task-id').value,
                    title: document.getElementById('subtask-title').value,
                    start_time: document.getElementById('subtask-start').value || null,
                    end_time: document.getElementById('subtask-end').value || null,
                    external_resource: document.getElementById('subtask-url').value,
                    admin_id: currentUser.id
                };
                
                try {
                    await client.from('speed_subtasks').insert([payload]);
                    closeSubTaskModal(); fetchData();
                } catch(err) { console.error(err); }
            });

            window.editTask = async function(taskId) {
                const task = tasks.find(t => t.id === taskId);
                if (!task) return;
                document.getElementById('edit-task-id').value = task.id;
                document.getElementById('task-title').value = task.title;
                document.getElementById('task-subject').value = task.subject;
                document.getElementById('task-desc').value = task.description || '';
                document.getElementById('task-url-master').value = task.external_resource || '';
                document.getElementById('task-start').value = task.start_time ? task.start_time.slice(0, 16) : '';
                document.getElementById('task-end').value = task.end_time ? task.end_time.slice(0, 16) : '';
                document.getElementById('modal-title').textContent = 'Modify Master Task';
                document.getElementById('task-modal').classList.remove('hidden');
            };

            window.deleteTask = async function(taskId) { 
                if (confirm('Delete this entire master task and all associated units?')) { 
                    await client.from('speed_tasks').delete().eq('id', taskId); 
                    fetchData(); 
                } 
            };

            window.deleteSubTask = async function(id) { 
                if (confirm('Delete this unit?')) { 
                    await client.from('speed_subtasks').delete().eq('id', id); 
                    fetchData(); 
                } 
            };

            checkAuth();
        })();
    </script>
</body>
</html>
