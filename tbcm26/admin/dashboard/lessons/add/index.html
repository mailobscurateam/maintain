<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .success-animation {
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        [v-cloak] { display: none; }
        
        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <!-- Auth Guard Overlay -->
    <div id="authGuard" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <i class="fas fa-circle-notch fa-spin text-4xl text-indigo-600 mb-4"></i>
            <p class="text-slate-600 font-medium">Verifying Session...</p>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeDeleteModal()"></div>
        <div class="bg-white rounded-2xl p-6 shadow-2xl relative w-full max-w-sm transform transition-all">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-4 mx-auto">
                <i class="fas fa-exclamation-triangle text-xl"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-900 text-center mb-2">Delete Lesson?</h3>
            <p class="text-slate-500 text-center text-sm mb-6">This action cannot be undone.</p>
            <div class="flex space-x-3">
                <button onclick="closeDeleteModal()" class="flex-1 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-semibold transition-colors">Cancel</button>
                <button id="confirmDeleteBtn" class="flex-1 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl font-semibold transition-colors">Delete</button>
            </div>
        </div>
    </div>

    <!-- Edit Lesson Modal -->
    <div id="editModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeEditModal()"></div>
        <div class="bg-white rounded-2xl p-8 shadow-2xl relative w-full max-w-2xl my-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800 flex items-center">
                    <i class="fas fa-edit text-indigo-600 mr-2"></i> Edit Lesson
                </h2>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="editLessonForm" class="space-y-4">
                <input type="hidden" name="id" id="edit_id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Lesson Title</label>
                        <input type="text" name="title" id="edit_title" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Type</label>
                        <select name="lesson_type" id="edit_lesson_type" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                            <option value="zoom">Zoom</option>
                            <option value="youtube">YouTube</option>
                            <option value="pdf">PDF</option>
                            <option value="live">Live</option>
                            <option value="external">External Link</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Month</label>
                        <select name="month" id="edit_month" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                            <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                            <option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option>
                            <option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option>
                            <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Topics / Categories</label>
                    <input type="text" name="categories" id="edit_categories" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Content URL</label>
                    <input type="url" name="video_url" id="edit_video_url" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Hours</label>
                        <input type="number" name="watchtime_hours" id="edit_watchtime_hours" required min="0" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Minutes</label>
                        <input type="number" name="watchtime_minutes" id="edit_watchtime_minutes" required min="0" max="59" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                    <textarea name="description" id="edit_description" rows="3" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                </div>
                <div class="flex space-x-3 mt-6">
                    <button type="button" onclick="closeEditModal()" class="flex-1 py-3 px-6 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-semibold transition-all">Cancel</button>
                    <button type="submit" id="editSubmitBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition-all flex items-center justify-center">
                        <span>Save Changes</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="max-w-6xl mx-auto py-12 px-4 sm:px-6">
        <!-- Header & Action Bar -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 space-y-4 md:space-y-0">
            <div class="text-left">
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Lesson Management</h1>
                <p class="text-slate-500 mt-2 text-sm md:text-base">Create and update educational content</p>
            </div>
            <div class="flex items-center space-x-3">
                <a href="/tbcm26/admin/dashboard" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-lg transition-colors border border-slate-200 flex items-center">
                    <i class="fas fa-arrow-left mr-2"></i> Dashboard
                </a>
                <button id="logoutBtn" class="px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-red-100 flex items-center">
                    <i class="fas fa-sign-out-alt mr-2"></i> Sign Out
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Column: Create Form -->
            <div class="lg:col-span-5 space-y-6">
                <div class="glass p-6 rounded-2xl shadow-xl border border-slate-100">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center">
                        <i class="fas fa-plus-circle text-indigo-600 mr-2"></i> Add New Lesson
                    </h2>
                    
                    <form id="lessonForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Select Course</label>
                            <select name="course_id" id="courseSelect" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white transition-all">
                                <option value="">Loading courses...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Lesson Title</label>
                            <input type="text" name="title" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="e.g. Advanced Quantum Mechanics">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Type</label>
                                <select name="lesson_type" id="lessonTypeSelect" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white transition-all">
                                    <option value="zoom">Zoom</option>
                                    <option value="youtube">YouTube</option>
                                    <option value="pdf">PDF</option>
                                    <option value="live">Live</option>
                                    <option value="external">External Link</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Month</label>
                                <select name="month" id="monthSelect" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white transition-all">
                                    <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                                    <option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option>
                                    <option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option>
                                    <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Topics / Categories</label>
                            <input type="text" name="categories" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="e.g. Physics, Quantum">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Content URL</label>
                            <input type="url" name="video_url" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="https://...">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Hours</label>
                                <input type="number" name="watchtime_hours" required min="0" value="0" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Minutes</label>
                                <input type="number" name="watchtime_minutes" required min="0" max="59" value="0" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                            <textarea name="description" rows="2" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="Short overview..."></textarea>
                        </div>
                        <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-indigo-100 transition-all flex items-center justify-center">
                            <span>Create Lesson</span>
                            <i class="fas fa-plus-circle ml-2"></i>
                        </button>
                    </form>

                    <div id="statusMessage" class="hidden mt-4 p-3 rounded-xl flex items-center space-x-3 transition-all">
                        <span id="statusIcon"></span>
                        <p id="statusText" class="text-xs font-medium"></p>
                    </div>
                </div>
            </div>

            <!-- Right Column: Lessons List -->
            <div class="lg:col-span-7 space-y-6">
                <div class="glass p-6 rounded-2xl shadow-xl border border-slate-100 flex flex-col h-[750px]">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 space-y-4 md:space-y-0">
                        <div>
                            <h2 class="text-xl font-bold text-slate-800">Course Lessons</h2>
                            <span id="lessonCount" class="bg-indigo-50 text-indigo-600 text-[10px] uppercase font-bold px-3 py-1 rounded-full">0 Lessons</span>
                        </div>
                        <div class="relative w-full md:w-48">
                            <i class="fas fa-filter absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                            <select id="categoryFilter" class="w-full pl-8 pr-4 py-2 text-xs border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white transition-all appearance-none cursor-pointer">
                                <option value="">All Categories</option>
                            </select>
                        </div>
                    </div>

                    <div id="lessonsList" class="flex-1 overflow-y-auto custom-scrollbar space-y-3 pr-2">
                        <div class="flex flex-col items-center justify-center h-full text-slate-400">
                            <i class="fas fa-layer-group text-4xl mb-3"></i>
                            <p>Select a course to view lessons</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://tsaoxjzvhxiggntibpui.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYW94anp2aHhpZ2dudGlicHVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDQ2OTAsImV4cCI6MjA5MTQyMDY5MH0.Q5Iu51O3NK4k2kcc_GoegnyAYIFIs2SUkQOV10qp2jI';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const lessonForm = document.getElementById('lessonForm');
        const editLessonForm = document.getElementById('editLessonForm');
        const courseSelect = document.getElementById('courseSelect');
        const lessonTypeSelect = document.getElementById('lessonTypeSelect');
        const categoryFilter = document.getElementById('categoryFilter');
        const lessonsList = document.getElementById('lessonsList');
        const lessonCount = document.getElementById('lessonCount');
        const statusMessage = document.getElementById('statusMessage');
        const statusText = document.getElementById('statusText');
        const statusIcon = document.getElementById('statusIcon');
        const submitBtn = document.getElementById('submitBtn');
        const editSubmitBtn = document.getElementById('editSubmitBtn');
        const authGuard = document.getElementById('authGuard');
        const logoutBtn = document.getElementById('logoutBtn');
        const deleteModal = document.getElementById('deleteModal');
        const editModal = document.getElementById('editModal');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

        const CACHE_COURSE_KEY = 'last_selected_course_id';
        const CACHE_TYPE_KEY = 'last_selected_lesson_type';

        let allLessons = [];
        let lessonToDeleteId = null;

        // AUTH CHECK
        async function checkUser() {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (error || !session) {
                window.location.href = '/login';
                return null;
            }
            authGuard.classList.add('hidden');
            return session.user;
        }

        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login';
        });

        // DELETE LOGIC
        window.openDeleteModal = function(id) {
            lessonToDeleteId = id;
            deleteModal.classList.remove('hidden');
        };

        window.closeDeleteModal = function() {
            lessonToDeleteId = null;
            deleteModal.classList.add('hidden');
        };

        confirmDeleteBtn.addEventListener('click', async () => {
            if (!lessonToDeleteId) return;
            confirmDeleteBtn.disabled = true;
            try {
                const { error } = await supabase.from('lessons').delete().eq('id', lessonToDeleteId);
                if (error) throw error;
                showMessage('Lesson deleted', 'success');
                fetchLessons(courseSelect.value);
                closeDeleteModal();
            } catch (err) {
                showMessage(err.message, 'error');
            } finally {
                confirmDeleteBtn.disabled = false;
            }
        });

        // EDIT LOGIC
        window.openEditModal = function(id) {
            const lesson = allLessons.find(l => l.id === id);
            if (!lesson) return;

            document.getElementById('edit_id').value = lesson.id;
            document.getElementById('edit_title').value = lesson.title;
            document.getElementById('edit_lesson_type').value = lesson.lesson_type;
            document.getElementById('edit_month').value = lesson.month;
            document.getElementById('edit_categories').value = lesson.categories;
            document.getElementById('edit_video_url').value = lesson.video_url;
            document.getElementById('edit_watchtime_hours').value = lesson.watchtime_hours;
            document.getElementById('edit_watchtime_minutes').value = lesson.watchtime_minutes;
            document.getElementById('edit_description').value = lesson.description || '';

            editModal.classList.remove('hidden');
        };

        window.closeEditModal = function() {
            editModal.classList.add('hidden');
        };

        editLessonForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            editSubmitBtn.disabled = true;
            editSubmitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Saving...';

            try {
                const formData = new FormData(editLessonForm);
                const updatePayload = {
                    title: formData.get('title'),
                    lesson_type: formData.get('lesson_type'),
                    month: parseInt(formData.get('month')),
                    categories: formData.get('categories'),
                    video_url: formData.get('video_url'),
                    watchtime_hours: parseInt(formData.get('watchtime_hours')) || 0,
                    watchtime_minutes: parseInt(formData.get('watchtime_minutes')) || 0,
                    description: formData.get('description')
                };

                const { error } = await supabase.from('lessons').update(updatePayload).eq('id', id);
                if (error) throw error;

                showMessage('Lesson updated successfully', 'success');
                fetchLessons(courseSelect.value);
                closeEditModal();
            } catch (err) {
                showMessage(err.message, 'error');
            } finally {
                editSubmitBtn.disabled = false;
                editSubmitBtn.innerHTML = 'Save Changes';
            }
        });

        // REUSABLE UI LOGIC
        function updateCategoryFilter(lessons) {
            const categories = new Set();
            lessons.forEach(l => { if (l.categories) l.categories.split(',').forEach(cat => categories.add(cat.trim())); });
            const currentVal = categoryFilter.value;
            categoryFilter.innerHTML = '<option value="">All Categories</option>';
            Array.from(categories).sort().forEach(cat => {
                const option = document.createElement('option');
                option.value = cat; option.textContent = cat;
                categoryFilter.appendChild(option);
            });
            if (Array.from(categories).includes(currentVal)) categoryFilter.value = currentVal;
        }

        function renderLessons(lessons) {
            const filtered = categoryFilter.value 
                ? lessons.filter(l => l.categories?.toLowerCase().includes(categoryFilter.value.toLowerCase()))
                : lessons;

            lessonCount.textContent = `${filtered.length} Lessons`;
            if (filtered.length === 0) {
                lessonsList.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-400 border-2 border-dashed border-slate-100 rounded-xl"><p>No lessons matching criteria.</p></div>`;
                return;
            }

            lessonsList.innerHTML = filtered.map(lesson => `
                <div class="p-4 bg-white border border-slate-100 rounded-xl hover:border-indigo-200 hover:shadow-md transition-all group relative">
                    <div class="flex justify-between items-start pr-12">
                        <div>
                            <span class="inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider mb-2 ${getTypeStyle(lesson.lesson_type)}">
                                ${lesson.lesson_type === 'external' ? 'Link' : lesson.lesson_type}
                            </span>
                            <h3 class="font-bold text-slate-800">${lesson.title}</h3>
                            <p class="text-xs text-slate-500 mt-1 line-clamp-1">${lesson.description || 'No description'}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-semibold text-slate-400 block mb-1">M${lesson.month}</span>
                            <span class="text-[10px] text-slate-400 bg-slate-50 px-2 py-0.5 rounded">
                                <i class="far fa-clock mr-1"></i>${lesson.watchtime_hours}h ${lesson.watchtime_minutes}m
                            </span>
                        </div>
                    </div>
                    <!-- Actions -->
                    <div class="absolute top-4 right-4 flex space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="openEditModal('${lesson.id}')" class="p-2 text-slate-400 hover:text-indigo-600 transition-colors" title="Edit">
                            <i class="fas fa-edit text-sm"></i>
                        </button>
                        <button onclick="openDeleteModal('${lesson.id}')" class="p-2 text-slate-400 hover:text-red-500 transition-colors" title="Delete">
                            <i class="fas fa-trash-alt text-sm"></i>
                        </button>
                    </div>
                    <div class="mt-3 pt-3 border-t border-slate-50 flex justify-between items-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-[10px] text-indigo-500 font-medium truncate max-w-[200px]">${lesson.categories}</span>
                        <a href="${lesson.video_url}" target="_blank" class="text-indigo-600 text-xs font-bold hover:underline">
                            Open <i class="fas fa-external-link-alt ml-1"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        async function fetchLessons(courseId) {
            if (!courseId) return;
            lessonsList.innerHTML = `<div class="flex items-center justify-center h-full"><i class="fas fa-circle-notch fa-spin text-2xl text-indigo-400"></i></div>`;
            try {
                const { data, error } = await supabase.from('lessons').select('*').eq('course_id', courseId).order('month', { ascending: true }).order('created_at', { ascending: false });
                if (error) throw error;
                allLessons = data;
                updateCategoryFilter(allLessons);
                renderLessons(allLessons);
            } catch (err) {
                lessonsList.innerHTML = `<p class="text-red-500 text-center p-4">Error loading lessons</p>`;
            }
        }

        function getTypeStyle(type) {
            switch(type) {
                case 'youtube': return 'bg-red-50 text-red-600';
                case 'zoom': return 'bg-blue-50 text-blue-600';
                case 'pdf': return 'bg-orange-50 text-orange-600';
                case 'external': return 'bg-emerald-50 text-emerald-600';
                default: return 'bg-indigo-50 text-indigo-600';
            }
        }

        async function fetchCourses() {
            try {
                const { data, error } = await supabase.from('courses').select('id, name').order('name', { ascending: true });
                if (error) throw error;
                if (data && data.length > 0) {
                    courseSelect.innerHTML = '';
                    data.forEach(course => {
                        const option = document.createElement('option');
                        option.value = course.id; option.textContent = course.name;
                        courseSelect.appendChild(option);
                    });
                    const cached = localStorage.getItem(CACHE_COURSE_KEY);
                    courseSelect.value = (cached && data.some(d => d.id === cached)) ? cached : data[0].id;
                    fetchLessons(courseSelect.value);
                }
            } catch (err) { courseSelect.innerHTML = '<option>Error</option>'; }
        }

        courseSelect.addEventListener('change', (e) => {
            localStorage.setItem(CACHE_COURSE_KEY, e.target.value);
            categoryFilter.value = ""; 
            fetchLessons(e.target.value);
        });

        categoryFilter.addEventListener('change', () => renderLessons(allLessons));

        window.addEventListener('DOMContentLoaded', async () => {
            if (await checkUser()) {
                document.getElementById('monthSelect').value = new Date().getMonth() + 1;
                fetchCourses();
            }
        });

        function showMessage(msg, type = 'success') {
            statusMessage.className = `mt-4 p-3 rounded-xl flex items-center space-x-3 transition-all ${type === 'success' ? 'bg-green-100 text-green-800 success-animation' : 'bg-red-100 text-red-800'}`;
            statusIcon.innerHTML = type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-triangle"></i>';
            statusText.innerText = msg;
            statusMessage.classList.remove('hidden');
            setTimeout(() => statusMessage.classList.add('hidden'), 5000);
        }

        lessonForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Creating...';
            try {
                const formData = new FormData(lessonForm);
                const payload = {
                    course_id: formData.get('course_id'),
                    categories: formData.get('categories'),
                    title: formData.get('title'),
                    description: formData.get('description'),
                    lesson_type: formData.get('lesson_type'),
                    video_url: formData.get('video_url'),
                    watchtime_hours: parseInt(formData.get('watchtime_hours')) || 0,
                    watchtime_minutes: parseInt(formData.get('watchtime_minutes')) || 0,
                    month: parseInt(formData.get('month'))
                };
                const { error } = await supabase.from('lessons').insert([payload]);
                if (error) throw error;
                showMessage('Lesson added!', 'success');
                const pC = lessonForm.course_id.value, pM = lessonForm.month.value, pT = lessonForm.lesson_type.value;
                lessonForm.reset();
                lessonForm.course_id.value = pC; lessonForm.month.value = pM; lessonForm.lesson_type.value = pT;
                fetchLessons(pC);
            } catch (err) { showMessage(err.message, 'error'); }
            finally { submitBtn.disabled = false; submitBtn.innerHTML = 'Create Lesson <i class="fas fa-plus-circle ml-2"></i>'; }
        });
    </script>
</body>
</html>
