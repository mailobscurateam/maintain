<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approval Management Portal</title>
    <!-- Use Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            background: radial-gradient(circle at top left, #f8fafc, #e2e8f0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            opacity: 0; 
            transition: opacity 0.3s ease-in;
        }
        
        body.loaded {
            opacity: 1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .approval-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .approval-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="p-6">

    <div id="portal-container" class="max-w-md w-full glass-card rounded-3xl p-8 text-center" style="display: none;">
        
        <!-- Back Button -->
        <div class="flex justify-start mb-6">
            <a href="/tbcm26/admin/dashboard" class="flex items-center text-xs font-semibold text-slate-500 hover:text-blue-600 transition-colors group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Dashboard
            </a>
        </div>

        <!-- Header -->
        <div class="mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Approval Portal</h1>
            <p class="text-slate-500 mt-2 text-sm">Select a workflow to manage pending requests.</p>
        </div>

        <!-- Links Container -->
        <div class="space-y-4">
            
            <!-- Course Approvals -->
            <a href="/tbcm26/admin/dashboard/status/update/course" class="approval-btn block group relative">
                <div class="flex items-center p-4 bg-white border border-slate-200 rounded-2xl group-hover:border-blue-500 group-hover:bg-blue-50 transition-colors">
                    <div class="bg-blue-100 p-3 rounded-xl text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                    </div>
                    <div class="ml-4 text-left">
                        <span class="block font-semibold text-slate-700 group-hover:text-blue-700">Course Approvals</span>
                        <span class="text-[11px] text-slate-400">Review curriculum and enrollments</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-auto text-slate-300 group-hover:text-blue-500 transition-colors" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
            </a>

            <!-- Monthly Approvals -->
            <a href="/tbcm26/admin/dashboard/status/update/month" class="approval-btn block group relative">
                <div class="flex items-center p-4 bg-white border border-slate-200 rounded-2xl group-hover:border-emerald-500 group-hover:bg-emerald-50 transition-colors">
                    <div class="bg-emerald-100 p-3 rounded-xl text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div class="ml-4 text-left">
                        <span class="block font-semibold text-slate-700 group-hover:text-emerald-700">Monthly Approvals</span>
                        <span class="text-[11px] text-slate-400">Timesheets and recurring reports</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-auto text-slate-300 group-hover:text-emerald-500 transition-colors" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
            </a>

        </div>

        <!-- Footer Note -->
        <div class="mt-8 pt-6 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Internal Admin System</p>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('portal-container');
            container.style.display = 'block';
            document.body.classList.add('loaded');
        });
    </script>
</body>
</html>
