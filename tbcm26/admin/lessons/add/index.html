<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Entry System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .success-animation {
            animation: slideUp 0.5s ease-out forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <div class="max-w-4xl mx-auto py-12 px-4 sm:px-6">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Lesson Management</h1>
            <p class="text-slate-500 mt-2">Create a new lesson entry linked to an existing course</p>
        </div>

        <!-- Main Form Container -->
        <div class="space-y-6">
            <form id="lessonForm" class="glass p-8 rounded-2xl shadow-xl border border-slate-100 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Basic Info -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Lesson Title (Name)</label>
                        <input type="text" name="title" required
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="e.g. Advanced Quantum Mechanics">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Select Course</label>
                        <select name="course_id" id="courseSelect" required
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white transition-all">
                            <option value="">Loading courses...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Lesson Topics (Categories)</label>
                        <input type="text" name="categories" required
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="e.g. Physics, Quantum">
                    </div>

                    <!-- Lesson Type & Month -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Lesson Type</label>
                        <select name="lesson_type" required
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white transition-all">
                            <option value="">Select Type</option>
                            <option value="zoom">Zoom</option>
                            <option value="youtube">YouTube</option>
                            <option value="pdf">PDF</option>
                            <option value="live">Live</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Month</label>
                        <select name="month" required
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white transition-all">
                            <option value="1">January (1)</option>
                            <option value="2">February (2)</option>
                            <option value="3">March (3)</option>
                            <option value="4">April (4)</option>
                            <option value="5">May (5)</option>
                            <option value="6">June (6)</option>
                            <option value="7">July (7)</option>
                            <option value="8">August (8)</option>
                            <option value="9">September (9)</option>
                            <option value="10">October (10)</option>
                            <option value="11">November (11)</option>
                            <option value="12">December (12)</option>
                        </select>
                    </div>

                    <!-- Content Link -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Video URL (Content URL)</label>
                        <input type="url" name="video_url" required
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="https://...">
                    </div>

                    <!-- Watchtime Config -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Watchtime (Hours)</label>
                        <input type="number" name="watchtime_hours" required min="0"
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="0">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Watchtime (Minutes)</label>
                        <input type="number" name="watchtime_minutes" required min="0" max="59"
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="0">
                    </div>

                    <!-- Description -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                        <textarea name="description" rows="3"
                            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                            placeholder="Enter detailed lesson overview..."></textarea>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 px-6 rounded-xl shadow-lg shadow-indigo-200 transition-all flex items-center justify-center">
                        <span>Create Lesson</span>
                        <i class="fas fa-plus-circle ml-2"></i>
                    </button>
                </div>
            </form>

            <!-- Feedback Message -->
            <div id="statusMessage" class="hidden p-4 rounded-xl flex items-center space-x-3 transition-all duration-300">
                <span id="statusIcon"></span>
                <p id="statusText" class="text-sm font-medium"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://tsaoxjzvhxiggntibpui.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYW94anp2aHhpZ2dudGlicHVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDQ2OTAsImV4cCI6MjA5MTQyMDY5MH0.Q5Iu51O3NK4k2kcc_GoegnyAYIFIs2SUkQOV10qp2jI';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const lessonForm = document.getElementById('lessonForm');
        const courseSelect = document.getElementById('courseSelect');
        const statusMessage = document.getElementById('statusMessage');
        const statusText = document.getElementById('statusText');
        const statusIcon = document.getElementById('statusIcon');
        const submitBtn = document.getElementById('submitBtn');

        // Function to fetch courses and populate dropdown
        async function fetchCourses() {
            try {
                // Using 'name' column as per your structure
                const { data, error } = await supabase
                    .from('courses')
                    .select('id, name') 
                    .order('name', { ascending: true });

                if (error) throw error;

                if (data && data.length > 0) {
                    courseSelect.innerHTML = '<option value="">Choose a course...</option>';
                    data.forEach(course => {
                        const option = document.createElement('option');
                        option.value = course.id;
                        // Display name, fallback to id
                        option.textContent = course.name || `Course ID: ${course.id}`;
                        courseSelect.appendChild(option);
                    });
                } else {
                    courseSelect.innerHTML = '<option value="">No courses found</option>';
                }
            } catch (err) {
                console.error('Error fetching courses:', err);
                courseSelect.innerHTML = '<option value="">Error loading courses</option>';
            }
        }

        // Initialize Page
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelector('select[name="month"]').value = new Date().getMonth() + 1;
            fetchCourses();
        });

        function showMessage(msg, type = 'success') {
            statusMessage.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800', 'success-animation');
            void statusMessage.offsetWidth; 
            
            if (type === 'success') {
                statusMessage.classList.add('bg-green-100', 'text-green-800', 'success-animation');
                statusIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
            } else {
                statusMessage.classList.add('bg-red-100', 'text-red-800');
                statusIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
            }
            
            statusText.innerText = msg;
            statusMessage.classList.remove('hidden');
        }

        lessonForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Uploading...</span><i class="fas fa-circle-notch fa-spin ml-2"></i>';

            try {
                const formData = new FormData(lessonForm);
                
                const lessonPayload = {
                    course_id: formData.get('course_id'),
                    categories: formData.get('categories'),
                    title: formData.get('title'),
                    description: formData.get('description'),
                    lesson_type: formData.get('lesson_type'),
                    video_url: formData.get('video_url'),
                    watchtime_hours: parseInt(formData.get('watchtime_hours')) || 0,
                    watchtime_minutes: parseInt(formData.get('watchtime_minutes')) || 0,
                    month: parseInt(formData.get('month'))
                };

                const { data, error } = await supabase
                    .from('lessons')
                    .insert([lessonPayload])
                    .select();

                if (error) throw error;

                showMessage('Lesson created successfully!', 'success');
                lessonForm.reset();
                document.querySelector('select[name="month"]').value = new Date().getMonth() + 1;

            } catch (err) {
                console.error('Supabase Error:', err);
                showMessage(`Database Error: ${err.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Create Lesson</span><i class="fas fa-plus-circle ml-2"></i>';
            }
        });
    </script>
</body>
</html>
