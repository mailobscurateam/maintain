<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nexus Prime | Tharaka B Jayathilaka</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --math-primary: #ec4899; 
            --math-light-bg: #f8fafc;
            --math-text: #0f172a;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--math-light-bg);
            color: var(--math-text);
            overflow: hidden; 
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        #math-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -10;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 
                0 20px 25px -5px rgb(0 0 0 / 0.05), 
                0 8px 10px -6px rgb(0 0 0 / 0.05),
                inset 0 0 0 1px rgba(255, 255, 255, 0.4);
        }

        .input-field {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #0f172a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            border-color: var(--math-primary);
            background: #ffffff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
        }

        .gradient-btn {
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
            color: white;
            transition: all 0.3s ease;
        }

        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(236, 72, 153, 0.5);
        }

        .gradient-text {
            background: linear-gradient(to bottom right, #1e293b 30%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Animation for the Character (Eye) */
        .eye-icon {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .showing-password .eye-icon {
            transform: scale(1.2) rotate(10deg);
            color: var(--math-primary);
        }
        .showing-password .shield-char {
            transform: translateY(-2px);
            filter: drop-shadow(0 0 8px rgba(236, 72, 153, 0.3));
        }

        /* Ambient Glows */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.08) 0%, rgba(236, 72, 153, 0) 70%);
            border-radius: 50%;
            z-index: -5;
            filter: blur(40px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="math-canvas"></div>
    
    <!-- Decorative background elements -->
    <div class="ambient-glow top-0 left-0"></div>
    <div class="ambient-glow bottom-0 right-0"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-pink-600 rounded-2xl mb-6 shadow-xl shadow-pink-500/20 rotate-3">
                <span class="text-3xl font-black text-white">Σ</span>
            </div>
            <h1 class="text-4xl font-black tracking-tighter mb-2 text-slate-900">NEXUS<span class="text-pink-500">PRIME</span></h1>
            <p class="mono text-[10px] uppercase tracking-[0.3em] text-slate-400 font-bold">Mathematics Excellence Portal</p>
        </div>

        <div class="glass-panel rounded-[2.5rem] p-10" id="login-container">
            <h2 class="text-2xl font-bold mb-8 text-center text-slate-800">Student <span class="gradient-text">Sign In</span></h2>
            
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block mono text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2 ml-1">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="email" id="email" required placeholder="name@student.com" 
                            class="input-field w-full py-4 pl-12 pr-4 rounded-2xl text-sm placeholder:text-slate-300">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-end mb-2 ml-1">
                        <label class="block mono text-[10px] uppercase tracking-widest text-slate-500 font-bold">Secure Password</label>
                        <!-- Animated Character Helper -->
                        <div class="shield-char transition-all duration-300">
                             <i data-lucide="shield-check" class="w-4 h-4 text-pink-500/60" id="guard-icon"></i>
                        </div>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="input-field w-full py-4 pl-12 pr-12 rounded-2xl text-sm placeholder:text-slate-300">
                        
                        <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-pink-500 transition-colors">
                            <i data-lucide="eye" class="w-4 h-4 eye-icon" id="eye-icon"></i>
                        </button>
                    </div>
                    <div class="flex justify-end mt-3 mr-1">
                        <a href="/forgot-password" class="mono text-[9px] uppercase tracking-wider text-slate-400 hover:text-pink-600 transition-colors font-bold">Forgot Password?</a>
                    </div>
                </div>

                <div id="error-msg" class="hidden flex items-start space-x-2 p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-xs">
                    <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
                    <span id="error-text">Invalid credentials provided.</span>
                </div>

                <button type="submit" id="submit-btn" class="gradient-btn w-full py-4 rounded-2xl font-bold text-xs uppercase tracking-[0.2em] flex items-center justify-center space-x-3 shadow-lg shadow-pink-500/20">
                    <span>Access Portal</span>
                    <div class="spinner" id="btn-spinner"></div>
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                <p class="text-slate-400 text-xs font-medium">Trouble accessing your account?</p>
                <a href="#" class="text-pink-600 font-bold text-xs mt-2 inline-block hover:text-pink-700 transition-colors">Contact Administrator</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://tsaoxjzvhxiggntibpui.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzYW94anp2aHhpZ2dudGlicHVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDQ2OTAsImV4cCI6MjA5MTQyMDY5MH0.Q5Iu51O3NK4k2kcc_GoegnyAYIFIs2SUkQOV10qp2jI';

            if (!window.supabaseClient) {
                window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            const supabaseInstance = window.supabaseClient;

            const form = document.getElementById('login-form');
            const togglePass = document.getElementById('toggle-password');
            const passInput = document.getElementById('password');
            const loginContainer = document.getElementById('login-container');
            const eyeIcon = document.getElementById('eye-icon');
            const guardIcon = document.getElementById('guard-icon');

            // Show/Hide Password Logic
            togglePass.addEventListener('click', () => {
                const isPassword = passInput.type === 'password';
                passInput.type = isPassword ? 'text' : 'password';
                
                if (isPassword) {
                    loginContainer.classList.add('showing-password');
                    eyeIcon.setAttribute('data-lucide', 'eye-off');
                    guardIcon.setAttribute('data-lucide', 'shield-alert');
                } else {
                    loginContainer.classList.remove('showing-password');
                    eyeIcon.setAttribute('data-lucide', 'eye');
                    guardIcon.setAttribute('data-lucide', 'shield-check');
                }
                lucide.createIcons();
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const spinner = document.getElementById('btn-spinner');
                const submitBtn = document.getElementById('submit-btn');
                const errorMsg = document.getElementById('error-msg');
                
                errorMsg.classList.add('hidden');
                spinner.style.display = 'block';
                submitBtn.disabled = true;

                try {
                    const { error } = await supabaseInstance.auth.signInWithPassword({
                        email: document.getElementById('email').value,
                        password: passInput.value
                    });
                    if (error) throw error;
                    window.location.href = '/tbcm26/admin/dashboard';
                } catch (err) {
                    document.getElementById('error-text').textContent = err.message;
                    errorMsg.classList.remove('hidden');
                    lucide.createIcons();
                } finally {
                    spinner.style.display = 'none';
                    submitBtn.disabled = false;
                }
            });

            // Three.js Background
            const initScene = () => {
                const container = document.getElementById('math-canvas');
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 100;
                
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);

                const particles = new THREE.BufferGeometry();
                const particleCount = 1200;
                const posArr = new Float32Array(particleCount * 3);
                
                for(let i=0; i<particleCount * 3; i++) {
                    posArr[i] = (Math.random() - 0.5) * 400;
                }
                
                particles.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
                
                // Use a soft pink color for particles in light mode
                const pSystem = new THREE.Points(particles, new THREE.PointsMaterial({ 
                    size: 0.8, 
                    color: 0xec4899, 
                    transparent: true, 
                    opacity: 0.15 
                }));
                
                scene.add(pSystem);

                const animate = () => {
                    requestAnimationFrame(animate);
                    pSystem.rotation.y += 0.0004;
                    pSystem.rotation.x += 0.0002;
                    renderer.render(scene, camera);
                };
                
                animate();

                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            };

            document.addEventListener('DOMContentLoaded', () => {
                lucide.createIcons();
                initScene();
            });
        })();
    </script>
</body>
</html>
